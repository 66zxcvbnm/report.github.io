<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임무 보고서 작성</title>
    <link href="https://fonts.googleapis.com/css2?family=Dongle&family=Gowun+Dodum&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --folder-color: #a32a2a;
            --paper-color: #f4f4f4;
            --text-color: #1a1a1a;
            --font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            --pen-color: #f7c331;
            --cup-color: #ffffff;
            --snack-color: #ff99cc;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background-color: #2c2c2c;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }

        /* --- 좌측 컨트롤 패널 --- */
        .controls {
            width: 420px;
            background: #3d3d3d;
            padding: 25px;
            border-radius: 12px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls h2 { margin-top: 0; font-size: 1.3rem; border-bottom: 2px solid #555; padding-bottom: 10px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: bold; color: #ddd; }
        .control-group input[type="text"], 
        .control-group select,
        .control-group textarea {
            width: 100%; padding: 10px; box-sizing: border-box; border-radius: 6px;
            border: 1px solid #555; background: #2c2c2c; color: #fff; font-family: inherit;
        }
        .control-group textarea { resize: vertical; height: 70px; }
        .control-group input[type="color"] { width: 40px; height: 35px; border: none; cursor: pointer; border-radius: 4px; padding: 0; background: none; }
        
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row > div { flex: 1; }

        .tip-box { background: #2a3b4c; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; line-height: 1.5; border-left: 4px solid #4CAF50; }

        /* 사진 조절 패널 (바 형태) */
        .image-adjust-panel {
            background: #415942;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            border: 1px solid #5cb85c;
        }
        .image-adjust-panel h3 { margin: 0 0 10px 0; font-size: 1rem; color: #a5d6a7; }
        .slider-group { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.85rem;}
        .slider-group span { width: 40px; }
        .slider-group input[type="range"] { flex: 1; margin: 0 10px; }

        button.save-btn {
            width: 100%; padding: 14px; background: #4CAF50; color: white; border: none;
            border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 10px;
        }
        button.save-btn:hover { background: #45a049; transform: translateY(-2px); }

        /* --- 우측 미리보기 영역 --- */
        .preview-container {
            width: 650px; /* 장식을 위해 약간 넓게 */
            height: 1050px;
            flex-shrink: 0;
            background: #1a1a1a;
            position: relative;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        #capture-area {
            width: 100%; height: 100%;
            background-color: #1a1a1a; /* 책상 배경색 */
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* 삐뚤어진 파일철 래퍼 */
        .folder-wrapper {
            position: relative;
            transform: rotate(3deg); /* 파일철 자체는 삐뚤어짐 */
            display: flex; align-items: center; justify-content: center;
            z-index: 5;
        }

        /* 파일철 본체 */
        .folder {
            width: 500px; height: 940px;
            background-color: var(--folder-color);
            border-radius: 5px 20px 5px 5px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4), 10px 10px 20px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
        }
        .folder::before {
            content: ''; position: absolute; top: 30px; right: -12px;
            width: 20px; height: 160px; background-color: inherit;
            border-radius: 0 10px 10px 0; box-shadow: inset -5px 0 10px rgba(0,0,0,0.2);
        }

        /* 구겨진/찢어진 배경 종이들 (보고서 뒤) */
        .bg-paper { position: absolute; background: #e0e0e0; box-shadow: 2px 2px 8px rgba(0,0,0,0.3); z-index: 1; }
        .bg-paper-1 {
            width: 470px; height: 910px;
            transform: rotate(-5deg) translate(-10px, 10px);
            background: linear-gradient(135deg, #f0f0f0, #d0d0d0);
            border: 1px solid #ccc;
        }
        .bg-paper-2 {
            width: 480px; height: 880px;
            transform: rotate(1deg) translate(5px, -15px);
            background-color: #dbdbdb;
            /* 찢어진 효과 */
            clip-path: polygon(0% 0%, 100% 0%, 98% 20%, 100% 40%, 97% 60%, 100% 80%, 96% 100%, 0% 100%);
        }

        /* 보고서 종이 본체 (바르게 정렬) */
        .paper {
            width: 460px; height: 900px;
            background-color: var(--paper-color);
            color: var(--text-color);
            box-shadow: 3px 3px 15px rgba(0,0,0,0.3);
            padding: 35px 30px; box-sizing: border-box;
            position: relative; z-index: 2;
            font-family: var(--font-family);
            transform: rotate(-3deg); /* 파일철 회전을 상쇄하여 화면 기준 똑바르게 */
        }

        /* 클립 (우측 상단으로 이동) */
        .paper::before {
            content: '📎'; position: absolute;
            top: -15px; right: 30px; font-size: 38px;
            transform: rotate(15deg); z-index: 10;
        }

        /* 텍스트 레이아웃 */
        .corner-text { font-size: 0.75rem; font-weight: bold; position: absolute; top: 15px; left: 20px; letter-spacing: 1px; border-bottom: 1.5px solid var(--text-color); }
        .title { text-align: center; font-size: 2.2rem; font-weight: 900; margin-top: 15px; margin-bottom: 25px; border-bottom: 3px solid var(--text-color); padding-bottom: 10px; letter-spacing: 2px; }
        
        .top-section { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .info-table { width: 55%; font-size: 0.95rem; line-height: 2; border-top: 1px solid var(--text-color); border-bottom: 1px solid var(--text-color); padding: 10px 0; }
        .info-row { display: flex; border-bottom: 1px dotted rgba(0,0,0,0.3); }
        .info-row:last-child { border-bottom: none; }
        .info-label { width: 75px; font-weight: bold; }
        .info-value { flex: 1; word-break: keep-all; }

        /* 사진 프레임 */
        .photo-frame { overflow: hidden; position: relative; background: #ccc; resize: both; border: 2px solid var(--text-color); box-shadow: 2px 2px 8px rgba(0,0,0,0.2); }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; transform-origin: center; cursor: pointer; display: block; transition: outline 0.1s; }
        
        /* 이미지 클릭 활성화 테두리 */
        .active-img { outline: 4px solid #4CAF50; outline-offset: -4px; z-index: 10; }

        .main-photo-frame { width: 130px; height: 170px; transform: rotate(2deg); display: none; }
        
        .details-section { margin-top: 20px; min-height: 200px; }
        .details-section h3 { font-size: 1.15rem; border-bottom: 2px solid var(--text-color); padding-bottom: 5px; margin-bottom: 12px; }
        .details-content { font-size: 0.95rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

        .bottom-photos { margin-top: 20px; display: flex; gap: 15px; justify-content: center; align-items: center; height: 220px; }
        .bottom-photo-frame { width: 130px; height: 130px; border: 4px solid #fff; }

        /* --- 장식 CSS --- */
        .deco { position: absolute; z-index: 10; display: none; filter: drop-shadow(4px 4px 5px rgba(0,0,0,0.4)); }

        /* 필기구 (종이 하단) */
        .pen-wrapper {
            position: absolute; bottom: 20px; right: 50px;
            transform: rotate(-25deg); z-index: 20; display: block;
        }
        .pen-none { display: none; }
        /* 연필 */
        .pen-pencil { width: 12px; height: 150px; background: var(--pen-color); box-shadow: 3px 3px 5px rgba(0,0,0,0.3); position: relative;}
        .pen-pencil::before { content: ''; position: absolute; top: -15px; left: 0; width: 12px; height: 15px; background: linear-gradient(to bottom, #f29b9b 60%, #a3a3a3 60%, #d1d1d1 100%); border-radius: 3px 3px 0 0; }
        .pen-pencil::after { content: ''; position: absolute; bottom: -20px; left: 0; border-top: 20px solid #e8cc9e; border-left: 6px solid transparent; border-right: 6px solid transparent; }
        .pen-pencil-lead { position: absolute; bottom: -20px; left: 4.5px; border-top: 5px solid #333; border-left: 1.5px solid transparent; border-right: 1.5px solid transparent; z-index: 21; }
        /* 볼펜 */
        .pen-ballpoint { width: 10px; height: 150px; background: var(--pen-color); border-radius: 5px; box-shadow: 2px 2px 4px rgba(0,0,0,0.3); position: relative; }
        .pen-ballpoint::before { content: ''; position: absolute; width: 4px; height: 12px; background: #555; top: -12px; left: 3px; border-radius: 2px 2px 0 0; }
        .pen-ballpoint::after { content: ''; position: absolute; bottom: -12px; left: 1px; border-top: 12px solid #ccc; border-left: 4px solid transparent; border-right: 4px solid transparent; }
        /* 만년필 */
        .pen-fountain { width: 14px; height: 140px; background: var(--pen-color); border-radius: 8px 8px 0 0; box-shadow: 3px 3px 6px rgba(0,0,0,0.3); position: relative; }
        .pen-fountain::before { content: ''; position: absolute; top: 15px; left: 0; width: 14px; height: 5px; background: gold; }
        .pen-fountain::after { content: ''; position: absolute; bottom: -18px; left: 2px; border-top: 18px solid gold; border-left: 5px solid transparent; border-right: 5px solid transparent; }

        /* 음료 (좌측 상단) */
        #deco-drink { top: 40px; left: 30px; }
        .cup {
            width: 70px; height: 85px; background: var(--cup-color);
            border-radius: 5px 5px 15px 15px; position: relative;
        }
        .cup-handle {
            position: absolute; right: -25px; top: 20px;
            width: 30px; height: 40px; border: 8px solid var(--cup-color);
            border-left: none; border-radius: 0 20px 20px 0; box-sizing: border-box;
        }
        .cup-liquid {
            position: absolute; top: 4px; left: 4px; right: 4px; height: 12px;
            border-radius: 50%; background: #4a2511; /* 기본 커피 */
        }

        /* 음식 (좌측 하단) */
        #deco-food { bottom: 50px; left: 40px; }
        .food-riceball {
            width: 0; height: 0; border-left: 45px solid transparent; border-right: 45px solid transparent; border-bottom: 80px solid #fff; position: relative;
        }
        .food-riceball::after { content:''; position: absolute; bottom: -80px; left: -18px; width: 36px; height: 28px; background: #222; } /* 김 */
        
        .food-sandwich {
            width: 0; height: 0; border-left: 90px solid transparent; border-bottom: 90px solid #f5deb3; position: relative;
        }
        .food-sandwich::before { content:''; position: absolute; top: 25px; left: -70px; width: 90px; height: 12px; background: #8b4513; transform: rotate(45deg); }

        /* 간식 (우측 하단) */
        #deco-snack { bottom: 60px; right: 50px; }
        .snack-jelly { width: 60px; height: 50px; background: var(--snack-color); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        .snack-chip { width: 70px; height: 50px; background: var(--snack-color); border-radius: 50%; transform: rotate(20deg); box-shadow: inset 15px -10px 10px rgba(0,0,0,0.1); }
        .snack-cookie { width: 65px; height: 65px; background: var(--snack-color); border-radius: 50%; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2); position: relative; }
        .snack-cookie::after { content: ''; position: absolute; width: 8px; height: 8px; background: #333; border-radius: 50%; top: 15px; left: 20px; box-shadow: 20px 5px 0 #333, 10px 25px 0 #333, -5px 20px 0 #333, 25px 25px 0 #333; }
        .snack-candy { width: 35px; height: 35px; background: var(--snack-color); border-radius: 50%; position: relative; top: 10px;}
        .snack-candy::before, .snack-candy::after { content:''; position: absolute; top: 7px; border-top: 10px solid transparent; border-bottom: 10px solid transparent; }
        .snack-candy::before { right: 100%; border-right: 15px solid var(--snack-color); }
        .snack-candy::after { left: 100%; border-left: 15px solid var(--snack-color); }
    </style>
</head>
<body>

    <div class="controls">
        <h2>보고서 설정</h2>
        
        <div class="tip-box">
            💡 <strong>이미지 조정 팁</strong><br>
            첨부된 이미지를 <strong>클릭</strong>하면 하단에 조절 바(Slider)가 나타납니다. 모바일에서도 바를 움직여 크기와 위치를 쉽게 맞출 수 있습니다.
        </div>

        <div class="control-group">
            <label>글씨체 선택</label>
            <select id="fontSelect" onchange="updateFont()">
                <option value="'Pretendard', 'Noto Sans KR', sans-serif">기본 (고딕)</option>
                <option value="'Nanum Myeongjo', serif">나눔명조 (진지한 느낌)</option>
                <option value="'Gowun Dodum', sans-serif">고운돋움 (단정한 느낌)</option>
                <option value="'Nanum Pen Script', cursive">나눔펜글씨 (손글씨 느낌)</option>
                <option value="'Dongle', sans-serif">동글 (귀여운 느낌)</option>
            </select>
        </div>

        <div class="control-group flex-row">
            <div>
                <label>파일철 색상</label>
                <input type="color" id="folderColor" value="#a32a2a" oninput="updateColors()">
            </div>
            <div>
                <label>종이 색상</label>
                <input type="color" id="paperColor" value="#f4f4f4" oninput="updateColors()">
            </div>
            <div>
                <label>글씨 색상</label>
                <input type="color" id="textColor" value="#1a1a1a" oninput="updateColors()">
            </div>
        </div>

        <div class="control-group flex-row">
            <div>
                <label>필기구</label>
                <select id="penType" onchange="updateDecorations()">
                    <option value="pen-pencil">연필</option>
                    <option value="pen-ballpoint">볼펜</option>
                    <option value="pen-fountain">만년필</option>
                    <option value="pen-none">없음</option>
                </select>
            </div>
            <div>
                <label>색상</label>
                <input type="color" id="penColor" value="#f7c331" oninput="updateDecorations()">
            </div>
        </div>

        <div class="control-group flex-row">
            <div>
                <label>상단 장식 (음료)</label>
                <select id="drinkType" onchange="updateDecorations()">
                    <option value="none">없음</option>
                    <option value="water">물</option>
                    <option value="coffee" selected>커피</option>
                    <option value="greentea">녹차</option>
                    <option value="juice">주스</option>
                </select>
            </div>
            <div>
                <label>컵 색상</label>
                <input type="color" id="cupColor" value="#ffffff" oninput="updateDecorations()">
            </div>
        </div>

        <div class="control-group flex-row">
            <div>
                <label>하단 장식 1 (음식)</label>
                <select id="foodType" onchange="updateDecorations()">
                    <option value="none">없음</option>
                    <option value="food-sandwich" selected>샌드위치</option>
                    <option value="food-riceball">주먹밥</option>
                </select>
            </div>
        </div>

        <div class="control-group flex-row">
            <div>
                <label>하단 장식 2 (간식)</label>
                <select id="snackType" onchange="updateDecorations()">
                    <option value="none">없음</option>
                    <option value="jelly">젤리</option>
                    <option value="chip">감자칩</option>
                    <option value="cookie" selected>쿠키</option>
                    <option value="candy">사탕</option>
                </select>
            </div>
            <div>
                <label>색상</label>
                <input type="color" id="snackColor" value="#ff99cc" oninput="updateDecorations()">
            </div>
        </div>

        <hr style="border-color:#555; margin:20px 0;">

        <div class="control-group">
            <label>소속</label>
            <select id="affiliationSelect" onchange="toggleCustomAffiliation()">
                <option value="HELIOS">HELIOS</option>
                <option value="ECLIPSE">ECLIPSE</option>
                <option value="CUSTOM">직접 입력</option>
            </select>
            <input type="text" id="customAffiliation" placeholder="직접 입력" style="display:none; margin-top:5px;" oninput="updateText('affiliation')">
        </div>

        <div class="control-group">
            <label>임무번호 / 날짜 / 위치 / 동행인</label>
            <input type="text" id="missionNoInput" value="CASE-001" placeholder="임무번호" oninput="updateText('missionNo')" style="margin-bottom:5px;">
            <input type="text" id="dateInput" value="2026. 05. 23" placeholder="날짜" oninput="updateText('date')" style="margin-bottom:5px;">
            <input type="text" id="locationInput" value="Sector 7" placeholder="위치" oninput="updateText('location')" style="margin-bottom:5px;">
            <input type="text" id="companionInput" value="Agent K" placeholder="동행인" oninput="updateText('companion')">
        </div>

        <div class="control-group">
            <label>보고서 메인 사진</label>
            <input type="file" accept="image/*" onchange="loadMainImage(event)">
        </div>

        <div class="control-group">
            <label>임무 내용</label>
            <textarea id="detailsInput" oninput="updateText('details')">특이사항 없음. 임무 완수.</textarea>
        </div>

        <div class="control-group">
            <label>관련 이미지 첨부 (최대 3장)</label>
            <input type="file" accept="image/*" multiple onchange="loadBottomImages(event)">
        </div>

        <!-- 이미지 조정 슬라이더 패널 -->
        <div id="imageAdjustControls" class="image-adjust-panel">
            <h3>🎛️ 선택된 이미지 조절</h3>
            <div class="slider-group">
                <span>크기</span>
                <input type="range" id="imgScale" min="0.2" max="5" step="0.05" value="1" oninput="updateActiveImage()">
            </div>
            <div class="slider-group">
                <span>가로</span>
                <input type="range" id="imgX" min="-200" max="200" step="1" value="0" oninput="updateActiveImage()">
            </div>
            <div class="slider-group">
                <span>세로</span>
                <input type="range" id="imgY" min="-200" max="200" step="1" value="0" oninput="updateActiveImage()">
            </div>
        </div>

        <button class="save-btn" onclick="saveImage()">고화질 저장하기</button>
    </div>

    <div class="preview-container">
        <div id="capture-area">
            
            <!-- 상단 음료 장식 -->
            <div id="deco-drink" class="deco" style="display:block;">
                <div class="cup">
                    <div class="cup-liquid" id="drink-liquid"></div>
                    <div class="cup-handle"></div>
                </div>
            </div>

            <!-- 하단 음식 장식 -->
            <div id="deco-food" class="deco food-sandwich" style="display:block;"></div>
            
            <!-- 하단 간식 장식 -->
            <div id="deco-snack" class="deco snack-cookie" style="display:block;"></div>

            <div class="folder-wrapper">
                
                <!-- 하단 필기구 장식 -->
                <div class="pen-wrapper">
                    <div id="disp_pen" class="pen-pencil">
                        <div class="pen-pencil-lead" id="disp_pen_lead"></div>
                    </div>
                </div>

                <div class="folder">
                    <!-- 구겨진 뒷배경 종이들 -->
                    <div class="bg-paper bg-paper-1"></div>
                    <div class="bg-paper bg-paper-2"></div>

                    <div class="paper">
                        <div class="corner-text" id="disp_affiliation">HELIOS</div>
                        
                        <div class="title">임무 보고서</div>

                        <div class="top-section">
                            <div class="info-table">
                                <div class="info-row"><div class="info-label">임무번호</div><div class="info-value" id="disp_missionNo">CASE-001</div></div>
                                <div class="info-row"><div class="info-label">날짜</div><div class="info-value" id="disp_date">2026. 05. 23</div></div>
                                <div class="info-row"><div class="info-label">위치</div><div class="info-value" id="disp_location">Sector 7</div></div>
                                <div class="info-row"><div class="info-label">동행인</div><div class="info-value" id="disp_companion">Agent K</div></div>
                            </div>
                            
                            <div class="photo-frame main-photo-frame" id="mainPhotoFrame">
                                <img src="" id="disp_mainPhoto" onclick="setActiveImage(this)">
                            </div>
                        </div>

                        <div class="details-section">
                            <h3>임무 내용</h3>
                            <div class="details-content" id="disp_details">특이사항 없음. 임무 완수.</div>
                        </div>

                        <div class="bottom-photos" id="disp_bottomPhotos"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 텍스트/색상/폰트 업데이트 ---
        function updateText(field) {
            if (field === 'affiliation') {
                const select = document.getElementById('affiliationSelect').value;
                document.getElementById('disp_affiliation').innerText = select === 'CUSTOM' ? document.getElementById('customAffiliation').value : select;
            } else {
                document.getElementById('disp_' + field).innerText = document.getElementById(field + 'Input').value;
            }
        }

        function toggleCustomAffiliation() {
            const select = document.getElementById('affiliationSelect').value;
            document.getElementById('customAffiliation').style.display = select === 'CUSTOM' ? 'block' : 'none';
            updateText('affiliation');
        }

        function updateColors() {
            document.documentElement.style.setProperty('--folder-color', document.getElementById('folderColor').value);
            document.documentElement.style.setProperty('--paper-color', document.getElementById('paperColor').value);
            document.documentElement.style.setProperty('--text-color', document.getElementById('textColor').value);
        }

        function updateFont() {
            document.documentElement.style.setProperty('--font-family', document.getElementById('fontSelect').value);
        }

        // --- 장식(음료, 필기구, 간식) 업데이트 ---
        function updateDecorations() {
            // 필기구
            const penType = document.getElementById('penType').value;
            document.documentElement.style.setProperty('--pen-color', document.getElementById('penColor').value);
            const penEl = document.getElementById('disp_pen');
            penEl.className = penType;
            document.getElementById('disp_pen_lead').style.display = (penType === 'pen-pencil') ? 'block' : 'none';

            // 음료
            const drink = document.getElementById('drinkType').value;
            document.documentElement.style.setProperty('--cup-color', document.getElementById('cupColor').value);
            const drinkEl = document.getElementById('deco-drink');
            if(drink === 'none') { drinkEl.style.display = 'none'; }
            else {
                drinkEl.style.display = 'block';
                const colors = { water: '#add8e6', coffee: '#4a2511', greentea: '#c8e6c9', juice: '#ffc107' };
                document.getElementById('drink-liquid').style.background = colors[drink];
            }

            // 음식
            const food = document.getElementById('foodType').value;
            const foodEl = document.getElementById('deco-food');
            if(food === 'none') { foodEl.style.display = 'none'; }
            else { foodEl.className = 'deco ' + food; foodEl.style.display = 'block'; }

            // 간식
            const snack = document.getElementById('snackType').value;
            document.documentElement.style.setProperty('--snack-color', document.getElementById('snackColor').value);
            const snackEl = document.getElementById('deco-snack');
            if(snack === 'none') { snackEl.style.display = 'none'; }
            else { snackEl.className = 'deco snack-' + snack; snackEl.style.display = 'block'; }
        }

        // --- 이미지 로드 및 조절 기능 ---
        let activeImage = null;

        function loadMainImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('disp_mainPhoto');
                    img.src = e.target.result;
                    document.getElementById('mainPhotoFrame').style.display = 'block';
                    resetImageTransform(img);
                    setActiveImage(img);
                }
                reader.readAsDataURL(file);
            }
        }

        function loadBottomImages(event) {
            const files = event.target.files;
            const container = document.getElementById('disp_bottomPhotos');
            container.innerHTML = ''; 
            
            const maxFiles = Math.min(files.length, 3);
            const rotations = [-3, 2, 4];

            for (let i = 0; i < maxFiles; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const frame = document.createElement('div');
                    frame.className = 'photo-frame bottom-photo-frame';
                    frame.style.transform = `rotate(${rotations[i % 3]}deg)`;

                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.onclick = function() { setActiveImage(this); };
                    
                    resetImageTransform(img);
                    frame.appendChild(img);
                    container.appendChild(frame);

                    if (i === 0) setActiveImage(img); // 첫 번째 이미지 자동 활성화
                }
                reader.readAsDataURL(files[i]);
            }
        }

        function resetImageTransform(img) {
            img.dataset.scale = 1;
            img.dataset.x = 0;
            img.dataset.y = 0;
            applyTransform(img);
        }

        function applyTransform(img) {
            const x = img.dataset.x || 0;
            const y = img.dataset.y || 0;
            const s = img.dataset.scale || 1;
            img.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
        }

        // 선택된 이미지 설정 및 슬라이더 바인딩
        function setActiveImage(img) {
            if (activeImage) activeImage.classList.remove('active-img');
            activeImage = img;
            activeImage.classList.add('active-img');
            
            document.getElementById('imageAdjustControls').style.display = 'block';
            document.getElementById('imgScale').value = img.dataset.scale || 1;
            document.getElementById('imgX').value = img.dataset.x || 0;
            document.getElementById('imgY').value = img.dataset.y || 0;
        }

        // 슬라이더 변경 시 호출
        function updateActiveImage() {
            if (!activeImage) return;
            activeImage.dataset.scale = document.getElementById('imgScale').value;
            activeImage.dataset.x = document.getElementById('imgX').value;
            activeImage.dataset.y = document.getElementById('imgY').value;
            applyTransform(activeImage);
        }

        // --- 이미지 저장 (캡처 전 outline 제거) ---
        function saveImage() {
            if (activeImage) activeImage.classList.remove('active-img'); // 캡처 시 녹색 테두리 제거
            
            const captureArea = document.getElementById('capture-area');
            html2canvas(captureArea, {
                scale: 2.5,
                useCORS: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '임무보고서.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                // 캡처 후 다시 활성화 상태 복원
                if (activeImage) activeImage.classList.add('active-img');
            });
        }
    </script>
</body>
</html>
