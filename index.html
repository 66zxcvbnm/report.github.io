<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임무 보고서 작성</title>
    <link href="https://fonts.googleapis.com/css2?family=Dongle&family=Gowun+Dodum&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --folder-color: #a32a2a;
            --paper-color: #f4f4f4;
            --text-color: #1a1a1a;
            --font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            --bg-color: #1a1a1a;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background-color: #2c2c2c;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }

        /* --- 좌측 컨트롤 패널 --- */
        .controls {
            width: 420px;
            background: #3d3d3d;
            padding: 25px;
            border-radius: 12px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls h2 { margin-top: 0; font-size: 1.3rem; border-bottom: 2px solid #555; padding-bottom: 10px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: bold; color: #ddd; }
        .control-group input[type="text"], 
        .control-group select,
        .control-group textarea {
            width: 100%; padding: 10px; box-sizing: border-box; border-radius: 6px;
            border: 1px solid #555; background: #2c2c2c; color: #fff; font-family: inherit;
        }
        .control-group textarea { resize: vertical; height: 120px; }
        .control-group input[type="color"] { width: 40px; height: 35px; border: none; cursor: pointer; border-radius: 4px; padding: 0; background: none; }
        .control-group input[type="file"] { margin-bottom: 8px; }
        
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row > div { flex: 1; }

        .tip-box { background: #2a3b4c; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; line-height: 1.5; border-left: 4px solid #4CAF50; }

        /* 사진 조절 패널 */
        .image-adjust-panel {
            background: #415942;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            border: 1px solid #5cb85c;
        }
        .image-adjust-panel h3 { margin: 0 0 10px 0; font-size: 1rem; color: #a5d6a7; }
        .slider-group { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.85rem;}
        .slider-group span { width: 40px; }
        .slider-group input[type="range"] { flex: 1; margin: 0 10px; }

        button.save-btn {
            width: 100%; padding: 14px; background: #4CAF50; color: white; border: none;
            border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 10px;
        }
        button.save-btn:hover { background: #45a049; transform: translateY(-2px); }
        
        button.action-btn {
            padding: 8px 12px; background: #555; color: white; border: none;
            border-radius: 4px; font-size: 0.85rem; cursor: pointer;
        }
        button.action-btn:hover { background: #666; }

        /* --- 우측 미리보기 영역 --- */
        .preview-container {
            width: 560px;  /* 너비 560px */
            height: 1000px; /* 높이 1000px */
            flex-shrink: 0;
            background: #1a1a1a;
            position: relative;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        #capture-area {
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .folder-wrapper {
            position: relative;
            transform: rotate(2deg);
            display: flex; align-items: center; justify-content: center;
            z-index: 5;
        }

        .folder {
            width: 500px; height: 940px; /* 파일철 사이즈 */
            background-color: var(--folder-color);
            border-radius: 5px 20px 5px 5px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4), 10px 10px 20px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
        }
        .folder::before {
            content: ''; position: absolute; top: 30px; right: -12px;
            width: 20px; height: 160px; background-color: inherit;
            border-radius: 0 10px 10px 0; box-shadow: inset -5px 0 10px rgba(0,0,0,0.2);
        }

        /* 구겨진/찢어진 배경 종이들 */
        .bg-paper { position: absolute; background: #e0e0e0; box-shadow: 2px 2px 8px rgba(0,0,0,0.3); z-index: 1; }
        .bg-paper-1 { width: 470px; height: 920px; transform: rotate(-4deg) translate(-10px, 10px); background: linear-gradient(135deg, #f0f0f0, #d0d0d0); border: 1px solid #ccc; }
        .bg-paper-2 { width: 480px; height: 890px; transform: rotate(1deg) translate(5px, -15px); background-color: #dbdbdb; clip-path: polygon(0% 0%, 100% 0%, 98% 20%, 100% 40%, 97% 60%, 100% 80%, 96% 100%, 0% 100%); }

        .paper {
            width: 460px; height: 900px; /* 종이 사이즈 */
            background-color: var(--paper-color);
            color: var(--text-color);
            box-shadow: 3px 3px 15px rgba(0,0,0,0.3);
            padding: 25px 30px; box-sizing: border-box;
            position: relative; z-index: 2;
            font-family: var(--font-family);
            transform: rotate(-2deg);
            display: flex;
            flex-direction: column;
        }

        .paper::before { content: '📎'; position: absolute; top: -12px; right: 25px; font-size: 38px; transform: rotate(15deg); z-index: 10; }

        .corner-text { font-size: 0.75rem; font-weight: bold; position: absolute; top: 15px; left: 20px; letter-spacing: 1px; border-bottom: 1.5px solid var(--text-color); }
        
        .title { text-align: center; font-size: 2rem; font-weight: 900; margin-top: 10px; margin-bottom: 15px; border-bottom: 3px solid var(--text-color); padding-bottom: 8px; letter-spacing: 2px; flex-shrink: 0; }
        
        .top-section { display: flex; justify-content: space-between; margin-bottom: 15px; flex-shrink: 0; }
        .info-table { width: 55%; font-size: 0.9rem; line-height: 1.9; border-top: 1px solid var(--text-color); border-bottom: 1px solid var(--text-color); padding: 8px 0; }
        .info-row { display: flex; border-bottom: 1px dotted rgba(0,0,0,0.3); }
        .info-row:last-child { border-bottom: none; }
        .info-label { width: 80px; font-weight: bold; }
        .info-value { flex: 1; word-break: keep-all; }

        .photo-frame { overflow: hidden; position: relative; background: #ccc; resize: both; border: 2px solid var(--text-color); box-shadow: 2px 2px 8px rgba(0,0,0,0.2); }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; transform-origin: center; cursor: pointer; display: block; transition: outline 0.1s; }
        .active-img { outline: 4px solid #4CAF50; outline-offset: -4px; z-index: 10; }
        
        .main-photo-frame { width: 110px; height: 150px; transform: rotate(2deg); display: none; }
        
        .details-section { margin-top: 10px; flex-grow: 1; position: relative; }
        .details-section h3 { font-size: 1.1rem; border-bottom: 2px solid var(--text-color); padding-bottom: 4px; margin-bottom: 10px; }
        .details-content { font-size: 0.95rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

        .bottom-photos { margin-top: auto; padding-top: 15px; display: flex; gap: 12px; justify-content: center; align-items: center; height: 140px; flex-shrink: 0; }
        .bottom-photo-frame { width: 110px; height: 110px; border: 4px solid #fff; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>보고서 설정</h2>
        
        <div class="tip-box">
            💡 <strong>이미지 조정 팁</strong><br>
            첨부된 이미지를 <strong>클릭</strong>하면 하단에 조절 바(Slider)가 나타납니다. 4개의 사진 모두 각각 클릭하여 위치와 크기를 독립적으로 조절할 수 있습니다.
        </div>
        
        <div class="control-group">
            <label>배경 설정</label>
            <div class="flex-row" style="margin-bottom: 10px;">
                <div style="flex: 0 0 60px;">색상</div>
                <input type="color" id="bgColor" value="#1a1a1a" oninput="updateBackground()">
            </div>
            <div class="flex-row">
                <div style="flex: 0 0 60px;">이미지</div>
                <input type="file" id="bgImageInput" accept="image/*" onchange="loadBackgroundImage(event)" style="flex:1;">
                <button class="action-btn" onclick="clearBackgroundImage()">제거</button>
            </div>
        </div>
        
        <hr style="border-color:#555; margin:20px 0;">

        <div class="control-group">
            <label>글씨체 선택</label>
            <select id="fontSelect" onchange="updateFont()">
                <option value="'Pretendard', 'Noto Sans KR', sans-serif">기본 (고딕)</option>
                <option value="'Nanum Myeongjo', serif">나눔명조</option>
                <option value="'Gowun Dodum', sans-serif">고운돋움</option>
                <option value="'Nanum Pen Script', cursive">나눔펜글씨</option>
                <option value="'Dongle', sans-serif">동글</option>
            </select>
        </div>

        <div class="control-group flex-row">
            <div>
                <label>파일철 색상</label>
                <input type="color" id="folderColor" value="#a32a2a" oninput="updateColors()">
            </div>
            <div>
                <label>종이 색상</label>
                <input type="color" id="paperColor" value="#f4f4f4" oninput="updateColors()">
            </div>
            <div>
                <label>글씨 색상</label>
                <input type="color" id="textColor" value="#1a1a1a" oninput="updateColors()">
            </div>
        </div>

        <hr style="border-color:#555; margin:20px 0;">

        <div class="control-group">
            <label>소속</label>
            <select id="affiliationSelect" onchange="toggleCustomAffiliation();">
                <option value="HELIOS" selected>HELIOS</option>
                <option value="ECLIPSE">ECLIPSE</option>
                <option value="CUSTOM">직접 입력</option>
            </select>
            <input type="text" id="customAffiliation" placeholder="직접 입력" style="display:none; margin-top:5px;" oninput="updateText('affiliation')">
        </div>

        <div class="control-group">
            <label>문서 등급 / 임무 번호 / 작성 일자 / 임무 기간 / 동행인</label>
            <input type="text" id="documentGradeInput" value="1급 기밀" placeholder="문서 등급" oninput="updateText('documentGrade')" style="margin-bottom:5px;">
            <input type="text" id="missionNoInput" value="CASE-001" placeholder="임무 번호" oninput="updateText('missionNo')" style="margin-bottom:5px;">
            <input type="text" id="creationDateInput" value="2026. 05. 24" placeholder="작성 일자" oninput="updateText('creationDate')" style="margin-bottom:5px;">
            <input type="text" id="missionPeriodInput" value="2026. 05. 20 ~ 2026. 05. 23" placeholder="임무 기간" oninput="updateText('missionPeriod')" style="margin-bottom:5px;">
            <input type="text" id="companionInput" value="Agent K" placeholder="동행인" oninput="updateText('companion')">
        </div>

        <div class="control-group">
            <label>보고서 메인 사진</label>
            <input type="file" accept="image/*" onchange="loadMainImage(event)">
        </div>

        <div class="control-group">
            <label>임무 내용</label>
            <textarea id="detailsInput" oninput="updateText('details')">특이사항 없음. 임무 완수.</textarea>
        </div>

        <div class="control-group">
            <label>관련 이미지 첨부 (각각 선택)</label>
            <input type="file" accept="image/*" onchange="loadBottomImage(event, 1)">
            <input type="file" accept="image/*" onchange="loadBottomImage(event, 2)">
            <input type="file" accept="image/*" onchange="loadBottomImage(event, 3)">
        </div>

        <div id="imageAdjustControls" class="image-adjust-panel">
            <h3>🎛️ 선택된 이미지 조절</h3>
            <div class="slider-group">
                <span>크기</span>
                <input type="range" id="imgScale" min="0.2" max="5" step="0.05" value="1" oninput="updateActiveImage()">
            </div>
            <div class="slider-group">
                <span>가로</span>
                <input type="range" id="imgX" min="-200" max="200" step="1" value="0" oninput="updateActiveImage()">
            </div>
            <div class="slider-group">
                <span>세로</span>
                <input type="range" id="imgY" min="-200" max="200" step="1" value="0" oninput="updateActiveImage()">
            </div>
        </div>

        <button class="save-btn" onclick="saveImage()">저장하기 (560x1000)</button>
    </div>

    <div class="preview-container">
        <div id="capture-area">
            <div class="folder-wrapper">
                <div class="folder">
                    <div class="bg-paper bg-paper-1"></div>
                    <div class="bg-paper bg-paper-2"></div>

                    <div class="paper">
                        <div class="corner-text" id="disp_affiliation">HELIOS</div>
                        
                        <div class="title">임무 보고서</div>

                        <div class="top-section">
                            <div class="info-table">
                                <div class="info-row"><div class="info-label">문서 등급</div><div class="info-value" id="disp_documentGrade">1급 기밀</div></div>
                                <div class="info-row"><div class="info-label">임무 번호</div><div class="info-value" id="disp_missionNo">CASE-001</div></div>
                                <div class="info-row"><div class="info-label">작성 일자</div><div class="info-value" id="disp_creationDate">2026. 05. 24</div></div>
                                <div class="info-row"><div class="info-label">임무 기간</div><div class="info-value" id="disp_missionPeriod">2026. 05. 20 ~ 2026. 05. 23</div></div>
                                <div class="info-row"><div class="info-label">동행인</div><div class="info-value" id="disp_companion">Agent K</div></div>
                            </div>
                            
                            <div class="photo-frame main-photo-frame" id="mainPhotoFrame">
                                <img src="" id="disp_mainPhoto" onclick="setActiveImage(this)">
                            </div>
                        </div>

                        <div class="details-section">
                            <h3>임무 내용</h3>
                            <div class="details-content" id="disp_details">특이사항 없음. 임무 완수.</div>
                        </div>

                        <div class="bottom-photos" id="disp_bottomPhotos">
                            <div class="photo-frame bottom-photo-frame" id="bottomFrame1" style="transform: rotate(-3deg); display: none;">
                                <img src="" id="bottomImg1" onclick="setActiveImage(this)">
                            </div>
                            <div class="photo-frame bottom-photo-frame" id="bottomFrame2" style="transform: rotate(2deg); display: none;">
                                <img src="" id="bottomImg2" onclick="setActiveImage(this)">
                            </div>
                            <div class="photo-frame bottom-photo-frame" id="bottomFrame3" style="transform: rotate(4deg); display: none;">
                                <img src="" id="bottomImg3" onclick="setActiveImage(this)">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 텍스트/색상/폰트/배경 등 업데이트 ---
        function updateText(field) {
            if (field === 'affiliation') {
                const select = document.getElementById('affiliationSelect').value;
                document.getElementById('disp_affiliation').innerText = select === 'CUSTOM' ? document.getElementById('customAffiliation').value : select;
            } else {
                document.getElementById('disp_' + field).innerText = document.getElementById(field + 'Input').value;
            }
        }

        function toggleCustomAffiliation() {
            const select = document.getElementById('affiliationSelect').value;
            document.getElementById('customAffiliation').style.display = select === 'CUSTOM' ? 'block' : 'none';
            updateText('affiliation');
        }

        function updateColors() {
            document.documentElement.style.setProperty('--folder-color', document.getElementById('folderColor').value);
            document.documentElement.style.setProperty('--paper-color', document.getElementById('paperColor').value);
            document.documentElement.style.setProperty('--text-color', document.getElementById('textColor').value);
        }

        function updateFont() {
            document.documentElement.style.setProperty('--font-family', document.getElementById('fontSelect').value);
        }

        function updateBackground() {
            document.documentElement.style.setProperty('--bg-color', document.getElementById('bgColor').value);
        }

        function loadBackgroundImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('capture-area').style.backgroundImage = `url('${e.target.result}')`;
                }
                reader.readAsDataURL(file);
            }
        }

        function clearBackgroundImage() {
            document.getElementById('capture-area').style.backgroundImage = 'none';
            document.getElementById('bgImageInput').value = ''; 
        }
        
        // --- 이미지 로드 및 조절 기능 ---
        let activeImage = null;

        function loadMainImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('disp_mainPhoto');
                    img.src = e.target.result;
                    document.getElementById('mainPhotoFrame').style.display = 'block';
                    resetImageTransform(img);
                    setActiveImage(img);
                }
                reader.readAsDataURL(file);
            }
        }

        function loadBottomImage(event, index) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const frame = document.getElementById('bottomFrame' + index);
                    const img = document.getElementById('bottomImg' + index);
                    img.src = e.target.result;
                    frame.style.display = 'block'; 
                    resetImageTransform(img);
                    setActiveImage(img); 
                }
                reader.readAsDataURL(file);
            }
        }

        function resetImageTransform(img) {
            img.dataset.scale = 1;
            img.dataset.x = 0;
            img.dataset.y = 0;
            applyTransform(img);
        }

        function applyTransform(img) {
            const x = img.dataset.x || 0;
            const y = img.dataset.y || 0;
            const s = img.dataset.scale || 1;
            img.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
        }

        function setActiveImage(img) {
            if (activeImage) activeImage.classList.remove('active-img');
            activeImage = img;
            activeImage.classList.add('active-img');
            
            document.getElementById('imageAdjustControls').style.display = 'block';
            document.getElementById('imgScale').value = img.dataset.scale || 1;
            document.getElementById('imgX').value = img.dataset.x || 0;
            document.getElementById('imgY').value = img.dataset.y || 0;
        }

        function updateActiveImage() {
            if (!activeImage) return;
            activeImage.dataset.scale = document.getElementById('imgScale').value;
            activeImage.dataset.x = document.getElementById('imgX').value;
            activeImage.dataset.y = document.getElementById('imgY').value;
            applyTransform(activeImage);
        }

        // --- 이미지 저장 ---
        function saveImage() {
            if (activeImage) activeImage.classList.remove('active-img'); 
            
            const captureArea = document.getElementById('capture-area');
            html2canvas(captureArea, {
                scale: 1, // 1배율로 설정하여 정확히 560x1000 픽셀 사이즈로 출력되게 조정
                useCORS: true,
                backgroundColor: null 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '임무보고서.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                if (activeImage) activeImage.classList.add('active-img');
            });
        }
    </script>
</body>
</html>
